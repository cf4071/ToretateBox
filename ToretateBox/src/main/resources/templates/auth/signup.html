<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ユーザー登録 | とれたてBOX</title>
<link rel="stylesheet" th:href="@{/css/user/signup.css}">
</head>

<body>

<main class="signup-wrapper">

    <h2 class="signup-title">新規ユーザー登録</h2>

    <div th:if="${errorMessage}" class="error-message">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/signup}" method="post" th:object="${signupForm}">

        <div class="form-group">
            <label>氏名</label>
            <input type="text" th:field="*{name}">
        </div>

        <div class="form-group">
            <label>フリガナ</label>
            <input type="text" th:field="*{nameKana}">
        </div>

        <div class="form-group">
            <label>電話番号</label>
            <input type="text" th:field="*{phoneNumber}">
        </div>

        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" th:field="*{email}">
        </div>

        <div class="form-group">
            <label>パスワード</label>
            <input type="password" th:field="*{password}">
        </div>

        <div class="form-group">
            <label>パスワード（確認）</label>
            <input type="password" th:field="*{passwordConfirm}">
        </div>

        <div class="form-group">
            <label>郵便番号</label>
            <input type="text" th:field="*{postalCode}">
        </div>

        <div class="form-group">
            <label>都道府県</label>
            <input type="text" th:field="*{prefecture}">
        </div>

        <div class="form-group">
            <label>市区町村</label>
            <input type="text" th:field="*{city}">
        </div>

        <div class="form-group">
            <label>町名・番地</label>
            <input type="text" th:field="*{addressLine1}">
        </div>

        <div class="form-group">
            <label>建物名・部屋番号（任意）</label>
            <input type="text" th:field="*{addressLine2}">
        </div>

        <div class="button-group">
            <button type="submit" class="login-btn">登録</button>
            <a th:href="@{/top}" class="back-button">戻る</a>
        </div>

    </form>

</main>

</body>
</html>
