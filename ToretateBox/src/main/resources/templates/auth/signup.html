<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録 | とれたてBOX</title>
    <link rel="stylesheet" th:href="@{/css/auth/signup.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">
    <main th:fragment="content" class="signup-page">

        <div class="signup-wrapper">

            <h2 class="signup-title">新規ユーザー登録</h2>

            <div th:if="${errorMessage}" class="error-message">
                <p th:text="${errorMessage}"></p>
            </div>

            <form th:action="@{/signup}" method="post" th:object="${signupForm}">

                <div class="form-group">
                    <label>氏名</label>
                    <input type="text" th:field="*{name}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}"></p>
                </div>

                <div class="form-group">
                    <label>フリガナ</label>
                    <input type="text" th:field="*{nameKana}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('nameKana')}"
                       th:errors="*{nameKana}"></p>
                </div>

                <div class="form-group">
                    <label>電話番号</label>
                    <input type="text" th:field="*{phoneNumber}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('phoneNumber')}"
                       th:errors="*{phoneNumber}"></p>
                </div>

                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" th:field="*{email}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"></p>
                </div>

                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" th:field="*{password}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}"></p>
                </div>

                <div class="form-group">
                    <label>パスワード（確認）</label>
                    <input type="password" th:field="*{passwordConfirm}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('passwordConfirm')}"
                       th:errors="*{passwordConfirm}"></p>
                </div>

                <div class="form-group">
                    <label>郵便番号</label>
                    <input type="text" th:field="*{postalCode}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('postalCode')}"
                       th:errors="*{postalCode}"></p>
                </div>

                <div class="form-group">
                    <label>都道府県</label>
                    <input type="text" th:field="*{prefecture}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('prefecture')}"
                       th:errors="*{prefecture}"></p>
                </div>

                <div class="form-group">
                    <label>市区町村</label>
                    <input type="text" th:field="*{city}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('city')}"
                       th:errors="*{city}"></p>
                </div>

                <div class="form-group">
                    <label>町名・番地</label>
                    <input type="text" th:field="*{addressLine1}">
                    <p class="field-error"
                       th:if="${#fields.hasErrors('addressLine1')}"
                       th:errors="*{addressLine1}"></p>
                </div>

                <div class="form-group">
                    <label>建物名・部屋番号（任意）</label>
                    <input type="text" th:field="*{addressLine2}">
                </div>

                <div class="button-group">
                    <button type="submit" class="signup-btn">登録</button>
                    <a th:href="@{/top}" class="back-button">戻る</a>
                </div>

            </form>

        </div>

    </main>
</div>

</body>
</html>
