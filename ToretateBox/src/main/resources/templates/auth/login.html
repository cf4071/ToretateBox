<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>ログイン | とれたてBOX</title>

    <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

    <main th:fragment="content" class="login-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6">

                    <div class="login-box">

                        <!-- エラーメッセージ -->
                        <div th:if="${errorMessage}" class="alert alert-danger login-error" role="alert">
                            <p class="mb-0" th:text="${errorMessage}"></p>
                        </div>

                        <!-- タイトル -->
                        <div class="text-center">
                            <h2 class="login-heading">ログイン</h2>
                        </div>

                        <!-- フォーム -->
                        <form th:action="@{/login}" method="post" th:object="${loginForm}">

                            <div class="mb-4">
                                <label for="email" class="form-label login-label">メールアドレス</label>
                                <input type="email"
                                       id="email"
                                       th:field="*{email}"
                                       class="form-control login-input"
                                       placeholder="example@example.com"
                                       required>
                            </div>

                            <div class="mb-5">
                                <label for="password" class="form-label login-label">パスワード</label>
                                <input type="password"
                                       id="password"
                                       th:field="*{password}"
                                       class="form-control login-input"
                                       placeholder="********"
                                       required>
                            </div>

                            <!-- ボタン -->
                            <div class="login-button-area d-flex justify-content-center">
                                <button type="submit" class="btn login-btn-submit">ログイン</button>
                                <a th:href="@{/top}" class="btn login-btn-back">戻る</a>
                            </div>

                        </form>

                    </div>

                </div>
            </div>
        </div>
    </main>

</div>

</body>
</html>
