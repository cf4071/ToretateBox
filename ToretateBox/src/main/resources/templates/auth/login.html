<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>ログイン | とれたてBOX</title>

    <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

<main th:fragment="content" class="login-body">

<div class="login-wrapper">

    <div class="login-title">
        <h2>ログイン</h2>
    </div>

    <div th:if="${errorMessage}" class="error-message">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/login}" method="post" th:object="${loginForm}">

        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email"
                   id="email"
                   th:field="*{email}"
                   placeholder="example@example.com"
                   required>
        </div>

        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password"
                   id="password"
                   th:field="*{password}"
                   placeholder="********"
                   required>
        </div>

        <div class="button-group">
            <button type="submit" class="login-btn">ログイン</button>
            <a th:href="@{/top}" class="back-button">戻る</a>
        </div>

    </form>

</div>

</main>

</div>

</body>
</html>
