<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ログイン | とれたてBOX</title>

  <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>
<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">
  <main th:fragment="content">

    <section class="page-section">
      <div class="page-container">
        <h2 class="page-title">ログイン</h2>

        <div class="login-box">

          <!-- ログイン失敗 -->
          <div th:if="${param.error}" class="common-alert">
            メールアドレスまたはパスワードが正しくありません。
          </div>

          <form th:action="@{/login}" th:object="${loginForm}" method="post">

            <div class="form-group">
              <label for="email" class="form-label">メールアドレス</label>
              <input type="email" id="email" th:field="*{email}" class="form-input">
            </div>

            <div class="form-group">
              <label for="password" class="form-label">パスワード</label>
              <input type="password" id="password" th:field="*{password}" class="form-input">
            </div>

            <div class="btn-group">
              <button type="submit" class="common-btn btn-danger">ログイン</button>
              <a th:href="@{/top}" class="common-btn btn-primary">戻る</a>
            </div>

          </form>

        </div>
      </div>
    </section>

  </main>
</div>

</body>
</html>
