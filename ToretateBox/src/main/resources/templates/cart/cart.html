<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>カート | とれたてBOX</title>
    <link rel="stylesheet" th:href="@{/css/cart/cart.css}">
</head>
<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

    <main th:fragment="content">
        <section class="cart-page">
            <div class="page-container">

                <h2 class="page-title cart-title">ショッピングカート</h2>

                <!-- エラーメッセージ -->
                <div th:if="${errorMessage}" class="common-alert cart-error-message" th:text="${errorMessage}">
                    エラーメッセージ
                </div>

                <!-- カートが空の場合 -->
                <div th:if="${cartItems == null or #lists.isEmpty(cartItems)}" class="cart-empty">
                    <p class="cart-empty-text">カートに商品が入っていません。</p>
                    <a th:href="@{/top}" class="common-link cart-link-back">ショッピングを続ける</a>
                </div>

                <!-- カートに商品がある場合 -->
                <div th:if="${cartItems != null and !#lists.isEmpty(cartItems)}">
                    <div class="row g-4">

                        <!-- 左側：商品一覧 -->
                        <div class="col-12 col-lg-8">
                            <div class="cart-list">

                                <div class="cart-item" th:each="item : ${cartItems}">
                                    <!-- 商品画像 -->
                                    <div class="cart-item-image">
                                        <img th:src="@{${item.imageUrl}}" alt="商品画像">
                                    </div>

                                    <!-- 商品情報 -->
                                    <div class="cart-item-main">
                                        <p class="cart-item-name" th:text="${item.name}">商品名</p>
                                        <p class="cart-item-price">
                                            値段：
                                            <span th:text="${#numbers.formatInteger(item.price, 3, 'COMMA')}">0</span>
                                            円
                                        </p>
                                    </div>

                                    <!-- 右側情報 -->
                                    <div class="cart-item-side">

                                        <!-- 数量変更 -->
                                        <form th:action="@{/cart/update}" method="post" class="cart-quantity-form">
                                            <input type="hidden" name="productId" th:value="${item.productId}">

                                            <p class="quantity-title">数量</p>
                                            <select name="quantity" class="quantity-input" onchange="this.form.submit()">
                                                <option th:each="i : ${#numbers.sequence(1, 10)}"
                                                        th:value="${i}"
                                                        th:selected="${i == item.quantity}"
                                                        th:text="${i} + '個'">
                                                    1個
                                                </option>
                                            </select>
                                        </form>

                                        <!-- 小計 -->
                                        <p class="cart-item-subtotal">
                                            小計：
                                            <span th:text="${#numbers.formatInteger(item.subtotal, 3, 'COMMA')}">0</span>
                                            円
                                        </p>

                                        <!-- 削除 -->
                                        <form th:action="@{/cart/remove}" method="post" class="cart-remove-form">
                                            <input type="hidden" name="productId" th:value="${item.productId}">
                                            <button type="submit" class="common-btn btn-danger">削除</button>
                                        </form>
                                    </div>
                                </div>

                            </div>
                        </div>

                        <!-- 右側：合計と操作 -->
                        <div class="col-12 col-lg-4">
                            <div class="cart-total-box">
                                <div class="total-row total-header">
                                    <span>食材合計</span>
                                    <span th:text="${totalQuantity} + '点'">0点</span>
                                </div>
                                <div class="total-row">
                                    <span>合計金額</span>
                                    <span>
                                        ¥<span th:text="${#numbers.formatInteger(totalAmount, 3, 'COMMA')}">0</span>
                                    </span>
                                </div>
                            </div>

                            <div class="cart-actions">

                                <!-- ログインユーザー用 -->
                                <form th:if="${isLoggedIn}" th:action="@{/checkout}" method="get" class="d-grid">
                                    <button type="submit" class="common-btn btn-warning">レジへ進む</button>
                                </form>

                                <!-- ゲストユーザー用 -->
                                <form th:if="${!isLoggedIn}" th:action="@{/checkout}" method="get" class="d-grid">
                                    <button type="submit" class="common-btn btn-warning">レジへ進む</button>
                                </form>
                                
							 	<form th:if="${!isLoggedIn}" th:action="@{/guest}" method="get" class="d-grid">
									 <button type="submit" class="common-btn btn-primary">ゲスト情報登録へ</button>
								 </form>

                                <a th:href="@{/top}" class="common-link cart-link-back">ショッピングを続ける</a>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </section>
    </main>

</div>

</body>
</html>
