<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>レジ | とれたてBOX</title>

  <!-- 自分のCSS -->
  <link rel="stylesheet" th:href="@{/css/cart/checkout.css}">
</head>

<body class="checkout-page">

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="checkout-wrapper container py-5">

    <h2 class="checkout-title text-center fw-bold mb-5">レジ</h2>

    <div class="row g-4 justify-content-center align-items-start">

      <!-- 左：お届け先 -->
      <div class="col-12 col-lg-7">
        <section class="checkout-card address-card h-100">
          <h3 class="card-title">お届け先</h3>

          <div class="info-grid" th:if="${address != null}">
            <div class="info-row">
              <span class="label">氏名</span>
              <span class="value" th:text="${address.recipient}"></span>
            </div>

            <div class="info-row">
              <span class="label">郵便番号</span>
              <span class="value" th:text="${address.postalCode}"></span>
            </div>

            <div class="info-row info-row-address">
              <span class="label">住所</span>
              <span class="value">
                <span th:text="${address.prefecture}"></span>
                <span th:text="${address.city}"></span><br>
                <span th:text="${address.addressLine1}"></span><br>
                <span th:text="${address.addressLine2}"></span>
              </span>
            </div>


          <p th:if="${address == null}" class="empty-text mb-0">
            住所情報がありません。住所登録をしてください。
          </p>
        </section>
      </div>

      <!-- 右：金額 + ボタン -->
      <div class="col-12 col-lg-5">
        <section class="checkout-side">

          <!-- グレーの金額ボックス -->
          <div class="payment-summary" th:if="${cart != null and !#lists.isEmpty(cart)}">
            <h3 class="payment-title">お支払い金額</h3>

            <div class="payment-row">
              <span class="payment-label">食材合計数</span>
              <strong class="payment-value">
                <span th:text="${totalCount}">0</span>点
              </strong>
            </div>

            <div class="payment-row">
              <span class="payment-label">合計金額</span>
              <strong class="payment-value">
                <span th:text="${totalAmount}">0</span>円
              </strong>
            </div>
          </div>

          <!-- カートが空のとき -->
          <div class="payment-summary" th:if="${cart == null or #lists.isEmpty(cart)}">
            <h3 class="payment-title">お支払い金額</h3>
            <p class="empty-text mb-0">カートに商品が入っていません。</p>
          </div>

          <!-- 注文確定ボタン -->
          <form th:action="@{/order/confirm}" method="post" class="confirm-form">
            <button type="submit" class="confirm-btn">ご注文を確定する</button>
          </form>

          <!-- 戻るリンク -->
          <div class="back-link-area">
            <a th:href="@{/cart}" class="back-link">ショッピングカートに戻る</a>
          </div>

        </section>
      </div>

    </div>

  </main>

</div>

</body>
</html>
