<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>レジ | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/cart/checkout.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">
  <main th:fragment="content">
    <section class="page-section">
      <div class="page-container">

        <h2 class="page-title">レジ</h2>

        <div class="checkout-layout">

          <!-- 左：お届け先 -->
          <section class="checkout-card address-card">

            <div class="info-grid" th:if="${address != null}">
              <div class="info-row">
                <span class="label">氏名</span>
                <span class="value" th:text="${address.recipient}">山田太郎</span>
              </div>

              <div class="info-row">
                <span class="label">郵便番号</span>
                <span class="value" th:text="${address.postalCode}">123-4567</span>
              </div>

              <div class="info-row info-row-address">
                <span class="label">住所</span>
                <span class="value">
                  <span th:text="${address.prefecture}">東京都</span>
                  <span th:text="${address.city}">墨田区</span><br>
                  <span th:text="${address.addressLine1}">○○1-2-3</span><br>
                  <span th:text="${address.addressLine2}">△△マンション101</span>
                </span>
              </div>
            </div>

            <p th:if="${address == null}" class="empty-text">
              住所情報がありません。住所登録をしてください。
            </p>
          </section>

          <!-- 右：金額 + ボタン -->
          <section class="checkout-side">

            <div class="checkout-card payment-summary" th:if="${cart != null and !#lists.isEmpty(cart)}">
              <h3 class="card-title payment-title">お支払い金額</h3>

              <div class="payment-row single-line">
                <span class="payment-label">食材合計</span>
                <span class="payment-value">
                  <span th:text="${totalCount}">0</span>点
                </span>

                <span class="payment-label total-label">合計金額</span>
                <span class="payment-value total-value">
                  ¥<span th:text="${#numbers.formatInteger(totalAmount, 1, 'COMMA')}">0</span>
                </span>
              </div>
            </div>

            <div class="checkout-card payment-summary" th:if="${cart == null or #lists.isEmpty(cart)}">
              <h3 class="card-title payment-title">お支払い金額</h3>
              <p class="empty-text">カートに商品が入っていません。</p>
            </div>

            <form th:action="@{/order/confirm}" method="post" class="checkout-form">
              <button type="submit" class="common-btn btn-warning">
                ご注文を確定する
              </button>
            </form>

            <div class="back-link-area">
              <a th:href="@{/cart}" class="common-link back-link">ショッピングカートに戻る</a>
            </div>

          </section>

        </div>

      </div>
    </section>
  </main>
</div>

</body>
</html>
