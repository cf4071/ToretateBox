<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ゲスト情報登録 | とれたてBOX</title>



    <!-- 自分のCSS -->
    <link rel="stylesheet" th:href="@{/css/cart/guest.css}">
</head>

<body class="bg-light">

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">
<main th:fragment="content" class="container py-5">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">

            <div class="border-0 rounded-4">
                <div class="card-body p-4 p-md-5">

                    <h2 class="text-center fw-bold mb-4">ゲスト情報登録</h2>

                    <div th:if="${errorMessage}" class="alert alert-danger text-center" role="alert">
                        <p class="mb-0" th:text="${errorMessage}"></p>
                    </div>

                    <form th:action="@{/checkout}" method="post" th:object="${guestForm}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">宛名</label>
                            <input type="text" th:field="*{name}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">電話番号</label>
                            <input type="text" th:field="*{phoneNumber}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">郵便番号</label>
                            <input type="text" th:field="*{postalCode}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">都道府県</label>
                            <input type="text" th:field="*{prefecture}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">市区町村</label>
                            <input type="text" th:field="*{city}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">町名・番地</label>
                            <input type="text" th:field="*{addressLine1}" class="form-control">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">建物名・部屋番号（任意）</label>
                            <input type="text" th:field="*{addressLine2}" class="form-control">
                        </div>

                        <div class="d-flex justify-content-center gap-5">
                            <button type="submit" class="btn btn-warning px-4 fw-semibold">
                                レジへ進む
                            </button>
                            <a th:href="@{/cart}" class="btn btn-primary px-4 fw-semibold">
                                戻る
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</main>
</div>

</body>
</html>
