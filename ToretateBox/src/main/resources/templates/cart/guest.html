<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ゲスト情報登録 | とれたてBOX</title>
    <link rel="stylesheet" th:href="@{/css/cart/guest.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">
    <main th:fragment="content">
        <section class="page-section guest-page">
            <div class="page-container">
                <div class="guest-box">

                    <h2 class="page-title">ゲスト情報登録</h2>

                    <div th:if="${errorMessage}" class="common-alert guest-alert">
                        <p th:text="${errorMessage}">エラーメッセージ</p>
                    </div>

                    <form th:action="@{/guest}" method="post" th:object="${guestForm}" class="guest-form">

                        <div class="form-group">
                            <label class="form-label" for="name">宛名</label>
                            <input type="text" id="name" th:field="*{name}" class="form-input">
                            <div class="form-error"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="phoneNumber">電話番号</label>
                            <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="form-input">
                            <div class="form-error"
                                 th:if="${#fields.hasErrors('phoneNumber')}"
                                 th:errors="*{phoneNumber}"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="postalCode">郵便番号</label>
                            <input type="text" id="postalCode" th:field="*{postalCode}" class="form-input">
                            <div class="form-error"
                                 th:if="${#fields.hasErrors('postalCode')}"
                                 th:errors="*{postalCode}"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="prefecture">都道府県</label>
                            <input type="text" id="prefecture" th:field="*{prefecture}" class="form-input">
                            <div class="form-error"
                                 th:if="${#fields.hasErrors('prefecture')}"
                                 th:errors="*{prefecture}"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="city">市区町村</label>
                            <input type="text" id="city" th:field="*{city}" class="form-input">
                            <div class="form-error"
                                 th:if="${#fields.hasErrors('city')}"
                                 th:errors="*{city}"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="addressLine1">町名・番地</label>
                            <input type="text" id="addressLine1" th:field="*{addressLine1}" class="form-input">
                            <div class="form-error"
                                 th:if="${#fields.hasErrors('addressLine1')}"
                                 th:errors="*{addressLine1}"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="addressLine2">建物名・部屋番号（任意）</label>
                            <input type="text" id="addressLine2" th:field="*{addressLine2}" class="form-input">
                            <div class="form-error"
                                 th:if="${#fields.hasErrors('addressLine2')}"
                                 th:errors="*{addressLine2}"></div>
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="common-btn btn-danger">レジへ進む</button>
                            <a th:href="@{/cart}" class="common-btn btn-primary">戻る</a>
                        </div>

                    </form>

                </div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
