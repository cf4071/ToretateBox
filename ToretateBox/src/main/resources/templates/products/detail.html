<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - 商品詳細'">商品詳細</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* 左右2カラムのスタイル */
        .detail-container-2col {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .detail-left {
            flex: 1;
        }

        .detail-right {
            flex: 2;
        }

        .detail-image {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .detail-name {
            margin: 0 0 10px 0;
        }

        .detail-category, .detail-season, .detail-price, .detail-qty {
            margin: 5px 0;
        }

        .detail-description {
            margin: 10px 0;
        }

        .detail-buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-cart, .btn-back, .btn-delete {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- ▼ ヘッダー -->
<div th:replace="layout/header :: header"></div>

<main>

    <!-- ▼ 中央タイトル -->
    <div class="detail-title">
        <h2>食材詳細</h2>
    </div>

    <!-- ▼ 左右2カラムレイアウト -->
    <div class="detail-container-2col">

        <!-- ▼ 左：画像 -->
        <div class="detail-left">
            <div class="detail-image-box">
                <img th:src="${product.imageUrl != null} ? 
                            @{/images/{f}(f=${product.imageUrl})} :
                            @{/images/no-image.png}"
                     th:alt="${product.name}"
                     class="detail-image">
            </div>
        </div>

        <!-- ▼ 右：食材情報 -->
        <div class="detail-right">

            <h2 class="detail-name" th:text="${product.name}">食材名</h2>

            <p class="detail-category">
                カテゴリ：<span th:text="${product.category.name}"></span>
            </p>

            <p class="detail-season" th:if="${product.season != null}">
                旬：<span th:text="${product.season}"></span>
            </p>

            <p class="detail-price">
                価格：<span th:text="${product.price}"></span> 円
            </p>

            <p class="detail-qty">
                数量：
                <select name="qty">
                    <option th:each="i : ${#numbers.sequence(1, 10)}"
                            th:value="${i}" th:text="${i}"></option>
                </select>
            </p>

            <!-- 食材説明 -->
            <div class="detail-description" th:if="${product.description != null}">
                <p th:text="${product.description}"></p>
            </div>

            <!-- ▼ ボタン３つ -->
            <div class="detail-buttons">
                <form th:action="@{/cart/add}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button type="submit" class="btn-cart">カートへ</button>
                </form>

                <a th:href="@{/products}" class="btn-back">一覧へ戻る</a>

                <form th:action="@{'/products/delete/' + ${product.id}}"
                      method="post"
                      onsubmit="return confirm('本当に削除しますか？');">
                    <button type="submit" class="btn-delete">削除</button>
                </form>
            </div>

        </div>
    </div>

</main>

<!-- ▼ フッター -->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
