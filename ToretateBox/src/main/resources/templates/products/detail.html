<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - 商品詳細'">商品詳細</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- ▼ ヘッダー -->
<div th:replace="layout/header :: header"></div>

<main>

    <!-- ▼ 中央タイトル -->
    <div class="detail-title">
        <h2>食材詳細</h2>
    </div>

    <!-- ▼ 左右2カラムレイアウト -->
    <div class="detail-container-2col">

        <!-- ▼ 左：画像 -->
        <div class="detail-left">
            <div class="detail-image-box">
                <img th:src="${product.imageUrl != null}
                            ? @{/images/{f}(f=${product.imageUrl})}
                            : @{/images/no-image.png}"
                     th:alt="${product.name}"
                     class="detail-image">
            </div>
        </div>

        <!-- ▼ 右：食材情報 -->
        <div class="detail-right">

            <h2 class="detail-name" th:text="${product.name}">食材名</h2>

            <!-- 食材説明 -->
            <div class="detail-description"
                 th:if="${product.description != null}">
                <p th:text="${product.description}"></p>
            </div>

            <p class="detail-category">
                カテゴリ：
                <span th:text="${product.category.name}"></span>
            </p>

            <p class="detail-season"
               th:if="${product.season != null}">
                旬：
                <span th:text="${product.season}"></span>
            </p>

            <p class="detail-price">
                価格：
                <span th:text="${product.price}"></span> 円
            </p>

            <!-- ▼ 数量 + カートへ（同じ form） -->
            <form th:action="@{/cart/add}" method="post">

                <input type="hidden"
                       name="productId"
                       th:value="${product.id}">

                <p class="detail-qty">
                    数量：
                    <select name="quantity">
                        <option th:each="i : ${#numbers.sequence(1, 10)}"
                                th:value="${i}"
                                th:text="${i}">
                        </option>
                    </select>
                </p>

                <div class="detail-buttons">
                    <button type="submit" class="btn-cart">
                        カートへ
                    </button>

                    <a th:href="@{/products}" class="btn-back">
                        一覧へ戻る
                    </a>
                </div>

            </form>

        </div>
    </div>

</main>

<!-- ▼ フッター -->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
