<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>食材一覧 - とれたてBOX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- ▼ ヘッダー -->
<div th:replace="layout/header :: header"></div>

<main>
    <div class="grid">

        <div class="top-title">
            <h2>食材一覧</h2>
        </div>

        <!-- 商品カード -->
        <div th:if="${products != null}" th:each="p : ${products}" class="card">

            <div class="image-box">
                <a th:href="@{'/product/' + ${p.id}}">
                    <img th:src="${p.imageUrl != null} ? ${p.imageUrl} : '@{/images/no-image.png}'" alt="商品画像">
                </a>
            </div>

            <div class="name" th:text="${p.name}">商品名</div>
            <div class="price" th:text="${p.price + '円'}">0円</div>

            <!-- 旬バッジ -->
            <div th:if="${p.season != null}" class="season-badge" th:text="'旬：' + ${p.season}"></div>

        </div>

        <div th:if="${products == null or #lists.isEmpty(products)}">
            <p>商品がありません</p>
        </div>

    </div>

    <!-- ▼ ページネーション -->
    <div class="pagination">

        <a th:if="${currentPage > 0}"
           th:href="@{/products(page=${currentPage - 1})}">
            前へ
        </a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/products(page=${i})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active' : ''">
            </a>
        </span>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/products(page=${currentPage + 1})}">
            次へ
        </a>

    </div>

</main>

<!-- ▼ フッター -->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
