<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>注文完了 | とれたてBOX</title>



  <!-- 自分のCSS -->
  <link rel="stylesheet" th:href="@{/css/order/complete.css}">
</head>

<body class="complete-page">

  <main class="container complete-wrapper d-flex flex-column align-items-center justify-content-center text-center">

    <h2 class="complete-title">ご注文ありがとうございました</h2>

    <div class="mt-4">
      <a th:href="@{/products}" class="btn complete-btn">
        食材一覧へ
      </a>
    </div>

  </main>

</body>
</html>
