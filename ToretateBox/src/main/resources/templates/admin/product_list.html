<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>食材管理 | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/admin/product_list.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="admin-wrapper">

    <h2 class="admin-title">食材管理</h2>

    <div class="admin-empty" th:if="${products == null or #lists.isEmpty(products)}">
      食材データがありません。
    </div>

    <div class="admin-table-wrap" th:if="${products != null and !#lists.isEmpty(products)}">
      <table class="admin-table">

        <thead>
          <tr>
            <th class="col-id">食材ID</th>
            <th class="col-image">食材画像</th>
            <th class="col-name">食材名</th>
            <th class="col-desc">食材説明</th>
            <th class="col-price">価格</th>
            <th class="col-date">登録日</th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="p : ${products}">
            <td th:text="${p.id}">1</td>

			<td class="admin-image-cell"
			    th:with="
			      imgSrc=
			        ${ (p.imageUrl == null or p.imageUrl == '') ? '/images/no-image.png'
			          : (#strings.startsWith(p.imageUrl, '/') ? p.imageUrl
			            : '/images/' + p.imageUrl) }">
			
			  <img class="admin-thumb"
			       th:src="@{${imgSrc}}"
			       th:alt="${p.name} + 'の画像'">
			</td>


            <td th:text="${p.name}"></td>

            <td class="admin-desc-cell"
                th:text="${p.description}">
              説明
            </td>

            <td>
              <span th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')}"></span> 円
            </td>

            <td th:text="${p.createdAt != null ? #temporals.format(p.createdAt, 'yyyy/MM/dd') : ''}">
              2026/01/27
            </td>

            <td class="admin-actions">
              <a class="admin-link"
                 th:href="@{/admin/product_edit/{id}(id=${p.id})}">
                編集
              </a>

              <a class="admin-link danger"
                 th:href="@{/admin/product_delete/{id}(id=${p.id})}"
                 onclick="return confirm('削除しますか？');">
                削除
              </a>
            </td>
          </tr>
        </tbody>

      </table>
    </div>

    <div class="admin-paging"
         th:if="${productPage != null and productPage.totalPages > 1}">

      <a th:if="${productPage.hasPrevious()}"
         th:href="@{/admin/products(page=${productPage.number - 1})}">
        前へ
      </a>

      <span th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}">
        <a th:href="@{/admin/products(page=${i})}"
           th:text="${i + 1}"
           th:classappend="${i == productPage.number} ? ' active' : ''">
        </a>
      </span>

      <a th:if="${productPage.hasNext()}"
         th:href="@{/admin/products(page=${productPage.number + 1})}">
        次へ
      </a>

    </div>

  </main>

</div>

</body>
</html>
