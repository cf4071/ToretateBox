<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>食材管理 | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/admin/product_list.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="container py-5 admin-wrapper">

    <h2 class="admin-title text-center fw-bold mb-5">食材管理</h2>

    <div class="alert alert-light text-center border"
         th:if="${products == null or #lists.isEmpty(products)}">
      食材データがありません。
    </div>

    <div class="table-responsive admin-table-wrap"
         th:if="${products != null and !#lists.isEmpty(products)}">

      <table class="table align-middle text-center mb-0 admin-table">

        <thead>
          <tr>
            <th class="col-id">食材ID</th>
            <th class="col-image">食材画像</th>
            <th class="col-name">食材名</th>
            <th class="col-desc">食材説明</th>
            <th class="col-price">値段</th>
            <th class="col-date">登録日</th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="p, stat : ${products}"
              th:classappend="${stat.index % 2 == 1} ? ' admin-row-alt' : ''">

            <td th:text="${p.id}">1</td>

            <td class="admin-image-cell"
                th:with="imgSrc=${(p.imageUrl == null or p.imageUrl == '') 
                                  ? '/images/no-image.png' 
                                  : (#strings.startsWith(p.imageUrl, '/') 
                                      ? p.imageUrl 
                                      : '/images/' + p.imageUrl)}">
              <img class="admin-thumb img-fluid"
                   th:src="@{${imgSrc}}"
                   th:alt="${p.name} + 'の画像'"
                   onerror="this.src='/images/no-image.png';">
            </td>

            <td class="admin-name-cell" th:text="${p.name}">食材名</td>

            <td class="admin-desc-cell" th:text="${p.description}">説明</td>

            <td class="admin-price-cell">
              <span th:text="${#numbers.formatInteger(p.price, 1, 'COMMA')}"></span> 円
            </td>

            <td class="admin-date-cell"
                th:text="${p.createdAt != null ? #temporals.format(p.createdAt, 'M/d') : ''}">
              5/18
            </td>

            <td class="admin-actions">
              <a class="btn btn-primary admin-edit-btn btn-sm"
                 th:href="@{/admin/product_edit/{id}(id=${p.id})}">
                編集
              </a>
            </td>
          </tr>
        </tbody>

      </table>
    </div>

    <nav class="mt-5"
         th:if="${productPage != null and productPage.totalPages > 1}">
      <ul class="pagination justify-content-center admin-pagination">

        <li class="page-item" th:if="${productPage.hasPrevious()}">
          <a class="page-link"
             th:href="@{/admin/products(page=${productPage.number - 1})}">
            前へ
          </a>
        </li>

        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
            th:classappend="${i == productPage.number} ? ' active' : ''">
          <a class="page-link"
             th:href="@{/admin/products(page=${i})}"
             th:text="${i + 1}">
            1
          </a>
        </li>

        <li class="page-item" th:if="${productPage.hasNext()}">
          <a class="page-link"
             th:href="@{/admin/products(page=${productPage.number + 1})}">
            次へ
          </a>
        </li>

      </ul>
    </nav>

  </main>

</div>

</body>
</html>
