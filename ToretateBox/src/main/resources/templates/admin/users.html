<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ユーザー管理 | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/admin/users.css}">
</head>
<body class="users-page">

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="container py-5">

    <h2 class="page-title">ユーザー管理</h2>

    <div class="users-table-wrap mx-auto">
      <div class="table-responsive">
        <table class="table users-table align-middle text-center mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>メールアドレス</th>
              <th>名前</th>
              <th>電話番号</th>
              <th>郵便番号</th>
              <th>住所</th>
              <th>登録日</th>
              <th>詳細</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="row : ${rows}">
              <td th:text="${row.id}"></td>
              <td th:text="${row.email}"></td>
              <td th:text="${row.name}"></td>
              <td th:text="${row.phoneNumber}"></td>
              <td th:text="${row.postalCode}"></td>
              <td th:text="${row.address}"></td>
              <td th:text="${#temporals.format(row.createdAt, 'yyyy/MM/dd')}"></td>
              <td>
                <a th:href="@{/admin/users/{id}(id=${row.id})}"
                   class="common-btn btn-blue">
                  詳細
                </a>
              </td>
            </tr>

            <tr th:if="${rows == null or #lists.isEmpty(rows)}">
              <td colspan="8" class="empty-row">ユーザーデータがありません</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <nav class="mt-4" th:if="${totalPages != null and totalPages > 0}">
	  <ul class="pagination justify-content-center">
	
	    <li class="page-item"
	        th:classappend="${currentPage == 0} ? ' disabled'">
	      <a class="page-link"
	         th:if="${currentPage > 0}"
	         th:href="@{/admin/users(page=${currentPage - 1})}">
	        前へ
	      </a>
	      <span class="page-link" th:if="${currentPage == 0}">前へ</span>
	    </li>
	
	    <li class="page-item"
	        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
	        th:classappend="${i == currentPage} ? ' active' : ''">
	      <a class="page-link"
	         th:href="@{/admin/users(page=${i})}"
	         th:text="${i + 1}">
	        1
	      </a>
	    </li>
	
	    <li class="page-item"
	        th:classappend="${currentPage >= totalPages - 1} ? ' disabled'">
	      <a class="page-link"
	         th:if="${currentPage < totalPages - 1}"
	         th:href="@{/admin/users(page=${currentPage + 1})}">
	        次へ
	      </a>
	      <span class="page-link"
	            th:if="${currentPage >= totalPages - 1}">
	        次へ
	      </span>
	    </li>
	
	  </ul>
	</nav>

    <div class="users-back">
      <a th:href="@{/admin/products}" class="common-btn btn-blue">
        戻る
      </a>
    </div>

  </main>
</div>

</body>
</html>
