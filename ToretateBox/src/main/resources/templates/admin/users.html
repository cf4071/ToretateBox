<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ユーザー管理 | とれたてBOX</title>

  <!-- 自分のCSS -->
  <link rel="stylesheet" th:href="@{/css/admin/users.css}">
</head>
<body class="users-page">

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="container py-5">

    <!-- タイトル -->
    <div class="text-center mb-5">
      <h2 class="users-title fw-bold">ユーザー管理</h2>
    </div>

    <!-- テーブル -->
    <div class="users-table-wrap mx-auto">
      <div class="table-responsive">
        <table class="table users-table align-middle text-center mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>メールアドレス</th>
              <th>名前</th>
              <th>電話番号</th>
              <th>郵便番号</th>
              <th>住所</th>
              <th>登録日</th>
              <th>詳細</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="row : ${rows}">
              <td th:text="${row.id}"></td>
              <td th:text="${row.email}"></td>
              <td th:text="${row.name}"></td>
              <td th:text="${row.phoneNumber}"></td>
              <td th:text="${row.postalCode}"></td>
              <td th:text="${row.address}"></td>
              <td th:text="${#temporals.format(row.createdAt, 'yyyy/MM/dd')}"></td>
              <td>
                <a th:href="@{/admin/users/{id}(id=${row.id})}"
                   class="common-btn btn-danger">
                  詳細
                </a>
              </td>
            </tr>

            <tr th:if="${rows == null or #lists.isEmpty(rows)}">
              <td colspan="8" class="empty-row">ユーザーデータがありません</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ページネーション -->
    <div class="users-pagination text-center mt-4">
      <a class="page-number"
         th:if="${currentPage > 0}"
         th:href="@{/admin/users(page=${currentPage - 1})}">
         ‹
      </a>

      <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <a class="page-number"
           th:href="@{/admin/users(page=${i})}"
           th:text="${i + 1}"
           th:classappend="${i == currentPage} ? ' active' : ''">
          1
        </a>
      </span>

      <a class="page-number"
         th:if="${currentPage + 1 < totalPages}"
         th:href="@{/admin/users(page=${currentPage + 1})}">
         ›
      </a>
    </div>

    <!-- 戻るボタン -->
    <div class="text-center mt-4">
      <a th:href="@{/admin}" class="common-btn btn-primary">
        戻る
      </a>
    </div>

  </main>
</div>

</body>
</html>
