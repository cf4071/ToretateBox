<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>食材編集 | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/admin/product_edit.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::main})}">

  <main class="container py-5 admin-wrapper">

    <h2 class="page-title">食材編集</h2>

    <form th:action="@{/admin/product_update}"
          th:object="${productForm}"
          method="post"
          enctype="multipart/form-data"
          class="admin-form-card mx-auto">

      <input type="hidden" th:field="*{id}">
      <input type="hidden" th:field="*{imageUrl}">

      <!-- 食材名 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">食材名</div>
        <div class="col-md-5 admin-input-cell">
          <input type="text" th:field="*{name}" class="form-input">
        </div>
        <div class="col-md-4 admin-error-cell">
          <p class="form-error"
             th:if="${#fields.hasErrors('name')}"
             th:errors="*{name}"></p>
        </div>
      </div>

      <!-- カテゴリ -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">カテゴリ</div>
        <div class="col-md-5 admin-input-cell">
          <select th:field="*{categoryId}" class="form-input">
            <option value="">選択してください</option>
            <option value="1">野菜</option>
            <option value="2">果物</option>
          </select>
        </div>
        <div class="col-md-4 admin-error-cell">
          <p class="form-error"
             th:if="${#fields.hasErrors('categoryId')}"
             th:errors="*{categoryId}"></p>
        </div>
      </div>

      <!-- 旬の季節 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">旬の季節</div>
        <div class="col-md-5 admin-input-cell">
          <select th:field="*{season}" class="form-input">
            <option value="">選択してください</option>
            <option value="春">春</option>
            <option value="夏">夏</option>
            <option value="秋">秋</option>
            <option value="冬">冬</option>
            <option value="通年">通年</option>
          </select>
        </div>
        <div class="col-md-4 admin-error-cell">
          <p class="form-error"
             th:if="${#fields.hasErrors('season')}"
             th:errors="*{season}"></p>
        </div>
      </div>

      <!-- 食材説明 -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">食材説明</div>
        <div class="col-md-9 admin-input-cell admin-textarea-cell">
          <textarea th:field="*{description}" rows="4" class="form-textarea"></textarea>
          <p class="form-error mt-2"
             th:if="${#fields.hasErrors('description')}"
             th:errors="*{description}"></p>
        </div>
      </div>

      <!-- 値段 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">値段</div>
        <div class="col-md-5 admin-input-cell">
          <input type="number" th:field="*{price}" class="form-input">
        </div>
        <div class="col-md-4 admin-error-cell">
          <p class="form-error"
             th:if="${#fields.hasErrors('price')}"
             th:errors="*{price}"></p>
        </div>
      </div>

      <!-- 画像 -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">画像</div>
        <div class="col-md-9 admin-input-cell admin-textarea-cell">

          <div th:if="*{imageUrl != null and imageUrl != ''}" class="mb-3">
            <img th:src="@{*{imageUrl}}"
                 alt="現在の画像"
                 class="admin-preview-img">
          </div>

          <input type="file" th:field="*{imageFile}" class="form-input image-input">

          <p class="form-error mt-2"
             th:if="${#fields.hasErrors('imageFile')}"
             th:errors="*{imageFile}"></p>
        </div>
      </div>

      <div class="btn-group admin-btn-group">
        <button type="submit" class="common-btn btn-red">更新</button>
        <a th:href="@{/admin/products}" class="common-btn btn-blue">戻る</a>
      </div>

    </form>

  </main>

</div>

</body>
</html>
