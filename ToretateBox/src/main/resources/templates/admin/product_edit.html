<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>食材編集 | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/product_edit.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::main})}">

  <!-- ★ ここが「content」になる -->
  <main class="admin-wrapper">

    <h2 class="admin-title">食材編集</h2>

    <form th:action="@{/admin/product_update}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data"
          class="admin-form">

      <input type="hidden" th:field="*{id}" />

      <div class="form-row">
        <label>食材名</label>
        <input type="text" th:field="*{name}" required />
      </div>

      <div class="form-row">
        <label>説明</label>
        <textarea th:field="*{description}" rows="3"></textarea>
      </div>

      <div class="form-row">
        <label>価格</label>
        <input type="number" th:field="*{price}" required />
      </div>

      <div class="form-row">
        <label>カテゴリID</label>
        <input type="number" th:field="*{categoryId}" required />
      </div>

      <div class="form-row">
        <label>旬</label>
        <input type="text" th:field="*{season}" />
      </div>
      
	  <div class="form-row">
	    <label>画像</label>
	    <div>
	    <!-- ★ 画像を選ばない場合でもDBの値を残す -->
	    <input type="hidden" th:field="*{imageUrl}" />
	
	    <!-- 任意：いまの画像を見せる -->
	      <div th:if="*{imageUrl != null and imageUrl != ''}" style="margin:10px 12px;">
	        <img th:src="@{${product.imageUrl}}" alt="現在の画像" style="max-width:180px; border:1px solid #ccc;">
	      </div>
	
	      <input type="file" name="imageFile" accept="image/*" style="margin:10px 12px;" />
	    </div>
	  </div>

      <div class="form-actions">
        <button type="submit" class="admin-btn">更新する</button>
        <a th:href="@{/admin/products}" class="admin-link">一覧へ戻る</a>
      </div>

    </form>

  </main>

</div>

</body>
</html>
