<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>食材編集 | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/admin/product_edit.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::main})}">

  <main class="container py-5 admin-wrapper">

    <h2 class="admin-title text-center fw-bold mb-5">食材編集</h2>

    <form th:action="@{/admin/product_update}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data"
          class="admin-form-card mx-auto">

      <input type="hidden" th:field="*{id}" />

      <!-- 食材名 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">食材名</div>
        <div class="col-md-9 admin-input-cell">
          <input type="text" th:field="*{name}" class="form-control" required>
        </div>
      </div>

      <!-- カテゴリ -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">カテゴリID</div>
        <div class="col-md-9 admin-input-cell">
          <input type="number" th:field="*{categoryId}" class="form-control" required>
        </div>
      </div>

      <!-- 旬 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">旬の季節</div>
        <div class="col-md-9 admin-input-cell">
          <input type="text" th:field="*{season}" class="form-control">
        </div>
      </div>

      <!-- 説明 -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">食材説明</div>
        <div class="col-md-9 admin-input-cell">
          <textarea th:field="*{description}" rows="4" class="form-control"></textarea>
        </div>
      </div>

      <!-- 値段 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">値段</div>
        <div class="col-md-9 admin-input-cell">
          <input type="number" th:field="*{price}" class="form-control" required>
        </div>
      </div>

      <!-- 画像 -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">画像</div>
        <div class="col-md-9 admin-input-cell">

          <input type="hidden" th:field="*{imageUrl}" />

          <!-- 現在画像 -->
          <div th:if="*{imageUrl != null and imageUrl != ''}" class="mb-3">
            <img th:src="@{${product.imageUrl}}"
                 alt="現在の画像"
                 class="admin-preview-img">
          </div>

          <!-- ファイル選択 -->
          <input type="file" name="imageFile" class="form-control">

        </div>
      </div>

      <!-- ボタン -->
      <div class="admin-form-actions text-center">
        <button type="submit" class="btn btn-danger admin-submit-btn me-3">更新</button>
        <a th:href="@{/admin/products}" class="btn btn-primary admin-back-btn">戻る</a>
      </div>

    </form>

  </main>

</div>

</body>
</html>
