<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ユーザー詳細 | とれたてBOX</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <!-- 自分のCSS -->
  <link rel="stylesheet" th:href="@{/css/admin/user_detail.css}">
</head>
<body class="user-detail-page">

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="container py-5">

    <!-- タイトル -->
    <div class="text-center mb-5">
      <h1 class="page-title">ユーザー詳細</h1>
    </div>

    <!-- 詳細テーブル -->
    <div class="detail-wrap mx-auto">
      <div class="detail-heading">ユーザー詳細</div>

      <div class="table-responsive">
        <table class="table detail-table mb-0">
          <tbody>
            <tr>
              <th>メールアドレス(ID)</th>
              <td th:text="${user.email}"></td>
            </tr>

            <tr>
              <th>ユーザー名</th>
              <td th:text="${user.name}"></td>
            </tr>

            <tr>
              <th>フリガナ</th>
              <td th:text="${user.nameKana}"></td>
            </tr>

            <tr>
              <th>電話番号</th>
              <td th:text="${user.phoneNumber}"></td>
            </tr>

            <tr>
              <th>郵便番号</th>
              <td th:text="${postalCode}"></td>
            </tr>

            <tr>
              <th>都道府県</th>
              <td th:text="${addr != null ? addr.prefecture : ''}"></td>
            </tr>

            <tr>
              <th>市区町村</th>
              <td th:text="${addr != null ? addr.city : ''}"></td>
            </tr>

            <tr>
              <th>町名・番地</th>
              <td th:text="${addr != null ? addr.addressLine1 : ''}"></td>
            </tr>

            <tr>
              <th>建物名・部屋番号</th>
              <td th:text="${addr != null ? addr.addressLine2 : ''}"></td>
            </tr>

            <tr>
              <th>登録日</th>
              <td th:text="${#temporals.format(user.createdAt, 'yyyy/MM/dd')}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ボタン -->
    <div class="actions d-flex justify-content-center gap-5 mt-5 flex-wrap">
      <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
            method="post"
            onsubmit="return confirm('本当に削除しますか？');"
            class="m-0">

        <input type="hidden"
               th:name="${_csrf?.parameterName}"
               th:value="${_csrf?.token}" />

        <button type="submit" class="btn delete-btn">削除</button>
      </form>

      <a th:href="@{/admin/users}" class="btn back-btn">戻る</a>
    </div>

  </main>
</div>

</body>
</html>
