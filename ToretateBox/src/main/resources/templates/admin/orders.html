<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>注文管理</title>

  <!-- 自分のCSS -->
  <link rel="stylesheet" th:href="@{/css/admin/orders.css}">
</head>
<body class="orders-page">

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="container py-5">

    <!-- タイトル -->
    <div class="text-center mb-5">
      <h2 class="orders-title fw-bold">注文管理</h2>
    </div>

    <!-- テーブルカード -->
    <div class="orders-card mx-auto">
      <div class="table-responsive">
        <table class="table orders-table align-middle text-center mb-0">
          <thead>
            <tr>
              <th>注文ID</th>
              <th>注文者名</th>
              <th>メール</th>
              <th>注文日時</th>
              <th>合計金額</th>
              <th>詳細</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="order : ${orders}">
              <td th:text="${order.id}"></td>
			  <td th:text="${order.name != null ? order.name : ''}"></td>
			  <td th:text="${order.email != null ? order.email : ''}"></td>
              <td th:text="${#temporals.format(order.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
              <td th:text="'￥' + ${order.totalAmount}"></td>
              <td>
                <a th:href="@{'/admin/orders/' + ${order.id}}" class="common-btn btn-danger">
                  詳細
                </a>
              </td>
            </tr>

            <tr th:if="${#lists.isEmpty(orders)}">
              <td colspan="6" class="empty-row">注文データがありません</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ページネーション -->
    <nav class="mt-4" th:if="${page != null and page.totalPages > 1}">
      <ul class="pagination justify-content-center custom-pagination">

        <li class="page-item" th:if="${!page.first}">
          <a class="page-link"
             th:href="@{/admin/orders(page=${page.number - 1})}">‹</a>
        </li>

        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
            th:classappend="${i == page.number} ? ' active' : ''">
          <a class="page-link"
             th:href="@{/admin/orders(page=${i})}"
             th:text="${i + 1}">1</a>
        </li>

        <li class="page-item" th:if="${!page.last}">
          <a class="page-link"
             th:href="@{/admin/orders(page=${page.number + 1})}">›</a>
        </li>

      </ul>
    </nav>

    <!-- 戻るボタン -->
    <div class="text-center">
      <a th:href="@{/admin/products}" class="common-btn btn-primary">
        戻る
      </a>
    </div>

  </main>
</div>

</body>
</html>
