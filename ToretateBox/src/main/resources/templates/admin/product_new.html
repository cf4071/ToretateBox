<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>食材登録 | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/admin/product_new.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::main})}">

  <main class="container py-5 admin-wrapper">

    <!-- タイトル -->
    <h2 class="admin-title text-center fw-bold mb-5">食材登録</h2>

    <form th:action="@{/admin/products/new}"
          th:object="${productForm}"
          method="post"
          enctype="multipart/form-data"
          class="admin-form-card mx-auto">

      <!-- CSRF -->
      <input type="hidden"
             th:if="${_csrf != null}"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}" />

      <!-- 食材名 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">
          食材名
        </div>
        <div class="col-md-9 admin-input-cell">
          <input type="text" th:field="*{name}" class="form-control" required>
          <p class="error mt-2 mb-0"
             th:if="${#fields.hasErrors('name')}"
             th:errors="*{name}"></p>
        </div>
      </div>

      <!-- カテゴリ -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">
          カテゴリID
        </div>
        <div class="col-md-9 admin-input-cell">
          <input type="number" th:field="*{categoryId}" class="form-control" required>
          <p class="error mt-2 mb-0"
             th:if="${#fields.hasErrors('categoryId')}"
             th:errors="*{categoryId}"></p>
        </div>
      </div>

      <!-- 旬 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">
          旬の季節
        </div>
        <div class="col-md-9 admin-input-cell">
          <input type="text" th:field="*{season}" class="form-control">
          <p class="error mt-2 mb-0"
             th:if="${#fields.hasErrors('season')}"
             th:errors="*{season}"></p>
        </div>
      </div>

      <!-- 説明 -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">
          食材説明
        </div>
        <div class="col-md-9 admin-input-cell">
          <textarea th:field="*{description}" rows="4" class="form-control"></textarea>
          <p class="error mt-2 mb-0"
             th:if="${#fields.hasErrors('description')}"
             th:errors="*{description}"></p>
        </div>
      </div>

      <!-- 価格 -->
      <div class="admin-form-row row g-0 row-orange">
        <div class="col-md-3 admin-label-cell">
          値段
        </div>
        <div class="col-md-9 admin-input-cell">
          <input type="number" th:field="*{price}" class="form-control" required>
          <p class="error mt-2 mb-0"
             th:if="${#fields.hasErrors('price')}"
             th:errors="*{price}"></p>
        </div>
      </div>

      <!-- 画像 -->
      <div class="admin-form-row row g-0 row-white">
        <div class="col-md-3 admin-label-cell">
          画像
        </div>
        <div class="col-md-9 admin-input-cell">
          <input type="hidden" th:field="*{imageUrl}">
          <input type="file" th:field="*{imageFile}" class="form-control image-input">
          <p class="error mt-2 mb-0"
             th:if="${#fields.hasErrors('imageFile')}"
             th:errors="*{imageFile}"></p>
        </div>
      </div>

      <!-- ボタン -->
	  <div class="admin-form-actions text-center">
		 <button type="submit" class="btn btn-danger admin-btn me-3">登録</button>
		 <a th:href="@{/admin/products}" class="btn btn-primary admin-btn">もどる</a>
	  </div>

    </form>

  </main>

</div>

</body>
</html>
