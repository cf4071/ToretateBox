<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>header</title>
</head>

<header th:fragment="header" class="site-header">

  <!-- 上段：ロゴ + メニュー -->
  <div class="header-top">

    <!-- ロゴ -->
    <div class="logo-box">
      <a class="logo-text" th:href="@{/top}">とれたてBOX</a>
    </div>

    <!-- 右側 -->
    <div class="header-right">

      <!-- 管理者 -->
      <nav class="header-menu" sec:authorize="hasRole('ADMIN')">
        <ul class="menu-list">
          <li><a th:href="@{/admin/products}">食材管理</a></li>
          <li><a th:href="@{/admin/product_new}">食材登録</a></li>
          <li><a th:href="@{/admin/orders}">注文管理</a></li>
          <li><a th:href="@{/admin/users}">顧客管理</a></li>
          <li><a th:href="@{/logout}">ログアウト</a></li>
        </ul>
      </nav>

      <!-- 一般ユーザー -->
      <nav class="header-menu" sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
        <ul class="menu-list">
          <li><a th:href="@{/products}">食材一覧</a></li>
          <li><a th:href="@{/cart}">カート</a></li>
          <li><a th:href="@{/mypage}">マイページ</a></li>
          <li><a th:href="@{/logout}">ログアウト</a></li>
        </ul>
      </nav>

      <!-- 未ログイン -->
      <nav class="header-menu" sec:authorize="isAnonymous()">
        <ul class="menu-list">
          <li><a th:href="@{/products}">食材一覧</a></li>
          <li><a th:href="@{/signup}">ユーザー登録</a></li>
          <li><a th:href="@{/login}">ログイン</a></li>
        </ul>
      </nav>

    </div>
  </div>

  <!-- 下段：検索欄（管理者以外） -->
  <div class="header-search-wrap" sec:authorize="!hasRole('ADMIN')">
    <form class="header-search" th:action="@{/search}" method="get">
      <input type="search" name="keyword" placeholder="フリーワード検索">
      <button type="submit">検索</button>
    </form>
  </div>

</header>
</html>
