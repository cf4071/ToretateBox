<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>header</title>
  <link rel="stylesheet" th:href="@{/css/layout/header.css}">
</head>

<body>
<header th:fragment="header" class="site-header border-bottom bg-light">

  <div class="container py-3">

    <!-- 上段 -->
    <div class="row align-items-center g-3">

      <!-- ロゴ -->
      <div class="col-12 col-lg-auto">
        <a th:href="@{/top}"
           class="logo-text text-decoration-none d-inline-block px-4 py-2 rounded-3 border">
          とれたてBOX
        </a>
      </div>

      <!-- 右側メニュー -->
      <div class="col-12 col-lg">
        <div class="d-flex justify-content-lg-end justify-content-start align-items-center">

          <!-- 管理者 -->
          <nav sec:authorize="hasRole('ADMIN')">
            <ul class="list-unstyled d-flex flex-wrap align-items-center justify-content-lg-end justify-content-start gap-4 mb-0 header-menu-list">
              <li><a th:href="@{/admin/products}" class="menu-link text-decoration-none">食材管理</a></li>
              <li><a th:href="@{/admin/product_new}" class="menu-link text-decoration-none">食材登録</a></li>
              <li><a th:href="@{/admin/orders}" class="menu-link text-decoration-none">注文管理</a></li>
              <li><a th:href="@{/admin/users}" class="menu-link text-decoration-none">顧客管理</a></li>
              <li>
                <form th:action="@{/logout}" method="post" class="mb-0">
                  <button type="submit" class="menu-link btn btn-link p-0 text-decoration-none header-link-button">
                    ログアウト
                  </button>
                </form>
              </li>
            </ul>
          </nav>

          <!-- 一般ユーザー -->
          <nav sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
            <ul class="list-unstyled d-flex flex-wrap align-items-center justify-content-lg-end justify-content-start gap-4 mb-0 header-menu-list">
              <li><a th:href="@{/products}" class="menu-link text-decoration-none">食材一覧</a></li>
              <li><a th:href="@{/cart}" class="menu-link text-decoration-none">カート</a></li>
              <li>
                <div class="dropdown">
                  <button class="btn p-0 border-0 bg-transparent shadow-none hamburger-btn"
                          type="button"
                          id="mypageMenuButton"
                          data-bs-toggle="dropdown"
                          aria-expanded="false"
                          aria-label="メニューを開く">
                    <span class="hamburger-icon">
                      <span class="hamburger-line"></span>
                      <span class="hamburger-line"></span>
                      <span class="hamburger-line"></span>
                    </span>
                  </button>

                  <ul class="dropdown-menu dropdown-menu-end mypage-dropdown"
                      aria-labelledby="mypageMenuButton">
                    <li><a class="dropdown-item" th:href="@{/mypage}">ユーザー情報確認</a></li>
                    <li><a class="dropdown-item" th:href="@{/edit}">ユーザー情報編集</a></li>
                    <li><a class="dropdown-item" th:href="@{/purchase_history}">購入履歴</a></li>
                    <li>
                      <form th:action="@{/logout}" method="post" class="mb-0">
                        <button type="submit" class="dropdown-item">ログアウト</button>
                      </form>
                    </li>
                  </ul>
                </div>
              </li>
            </ul>
          </nav>

          <!-- 未ログイン -->
          <nav sec:authorize="isAnonymous()">
            <ul class="list-unstyled d-flex flex-wrap align-items-center justify-content-lg-end justify-content-start gap-4 mb-0 header-menu-list">
              <li><a th:href="@{/products}" class="menu-link text-decoration-none">食材一覧</a></li>
              <li><a th:href="@{/signup}" class="menu-link text-decoration-none">ユーザー登録</a></li>
              <li><a th:href="@{/login}" class="menu-link text-decoration-none">ログイン</a></li>
            </ul>
          </nav>

        </div>
      </div>
    </div>

    <!-- 下段：検索欄（管理者以外） -->
    <div class="mt-3" sec:authorize="!hasRole('ADMIN')">
      <form th:action="@{/search}" method="get" class="row g-2 justify-content-center align-items-center">
        <div class="col-12 col-md-8 col-lg-7">
          <input type="search"
                 name="keyword"
                 class="form-control search-input"
                 placeholder="フリーワード検索">
        </div>
        <div class="col-12 col-md-auto">
          <button type="submit" class="common-btn btn-blue w-100 search-submit-btn">
            検索
          </button>
        </div>
      </form>
    </div>

  </div>

</header>
</body>
</html>
