<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>header</title>
</head>

<body>
<header th:fragment="header" class="site-header border-bottom">

  <div class="container py-3">

    <!-- 上段 -->
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

      <!-- ロゴ -->
      <div class="logo-box">
        <a class="logo-text text-decoration-none" th:href="@{/top}">とれたてBOX</a>
      </div>

      <!-- 右側メニュー -->
      <div class="d-flex align-items-center gap-4">

        <!-- 管理者 -->
        <nav sec:authorize="hasRole('ADMIN')">
          <ul class="list-unstyled d-flex align-items-center gap-4 mb-0">
            <li><a th:href="@{/admin/products}" class="menu-link">食材管理</a></li>
            <li><a th:href="@{/admin/product_new}" class="menu-link">食材登録</a></li>
            <li><a th:href="@{/admin/orders}" class="menu-link">注文管理</a></li>
            <li><a th:href="@{/admin/users}" class="menu-link">顧客管理</a></li>

            <!-- ログアウト（修正） -->
            <li>
              <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="menu-link btn btn-link p-0">
                  ログアウト
                </button>
              </form>
            </li>
          </ul>
        </nav>

        <!-- 一般ユーザー -->
        <nav sec:authorize="isAuthenticated() and !hasRole('ADMIN')"
             class="d-flex align-items-center gap-4">

          <a th:href="@{/products}" class="menu-link">食材一覧</a>
          <a th:href="@{/cart}" class="menu-link">カート</a>

          <div class="dropdown">
            <button class="btn hamburger-btn p-0 border-0 bg-transparent"
                    type="button"
                    id="mypageMenuButton"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">
              <span class="hamburger-line"></span>
              <span class="hamburger-line"></span>
              <span class="hamburger-line"></span>
            </button>

            <ul class="dropdown-menu dropdown-menu-end mypage-dropdown"
                aria-labelledby="mypageMenuButton">

              <li><a class="dropdown-item" th:href="@{/mypage}">ユーザー情報確認</a></li>
              <li><a class="dropdown-item" th:href="@{/edit}">ユーザー情報編集</a></li>
              <li><a class="dropdown-item" th:href="@{/purchase_history}">購入履歴</a></li>

              <!-- ログアウト（修正） -->
              <li>
                <form th:action="@{/logout}" method="post">
                  <button type="submit" class="dropdown-item">
                    ログアウト
                  </button>
                </form>
              </li>

            </ul>
          </div>
        </nav>

        <!-- 未ログイン -->
        <nav sec:authorize="isAnonymous()">
          <ul class="list-unstyled d-flex align-items-center gap-4 mb-0">
            <li><a th:href="@{/products}" class="menu-link">食材一覧</a></li>
            <li><a th:href="@{/signup}" class="menu-link">ユーザー登録</a></li>
            <li><a th:href="@{/login}" class="menu-link">ログイン</a></li>
          </ul>
        </nav>

      </div>
    </div>

    <!-- 下段：検索欄（管理者以外） -->
    <div class="mt-3" sec:authorize="!hasRole('ADMIN')">
      <form class="header-search d-flex justify-content-center gap-2"
            th:action="@{/search}" method="get">
        <input type="search"
               name="keyword"
               class="form-control search-input"
               placeholder="フリーワード検索">
        <button type="submit" class="common-btn btn-primary">検索</button>
      </form>
    </div>

  </div>

</header>
</body>
</html>
