<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>header</title>
  <link rel="stylesheet" th:href="@{/css/layout/header.css}">
</head>

<body>
<header th:fragment="header" class="site-header border-bottom">

  <div class="container header-container">

    <!-- 上段 -->
    <div class="header-top">

      <!-- ロゴ -->
      <div class="logo-box">
        <a class="logo-text text-decoration-none" th:href="@{/top}">とれたてBOX</a>
      </div>

      <!-- 右側メニュー -->
      <div class="header-menu-area">

        <!-- 管理者 -->
        <nav sec:authorize="hasRole('ADMIN')" class="header-nav">
          <ul class="header-menu-list">
            <li><a th:href="@{/admin/products}" class="menu-link">食材管理</a></li>
            <li><a th:href="@{/admin/product_new}" class="menu-link">食材登録</a></li>
            <li><a th:href="@{/admin/orders}" class="menu-link">注文管理</a></li>
            <li><a th:href="@{/admin/users}" class="menu-link">顧客管理</a></li>
            <li>
              <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="menu-link menu-button">
                  ログアウト
                </button>
              </form>
            </li>
          </ul>
        </nav>

        <!-- 一般ユーザー -->
        <nav sec:authorize="isAuthenticated() and !hasRole('ADMIN')" class="header-nav">
		  <ul class="header-menu-list">
		    <li class="header-menu-item">
		      <a th:href="@{/products}" class="menu-link">食材一覧</a>
		    </li>
		    <li class="header-menu-item">
		      <a th:href="@{/cart}" class="menu-link">カート</a>
		    </li>
		    <li class="header-menu-item">
		      <div class="dropdown">
		        <button class="btn hamburger-btn p-0 border-0 bg-transparent"
		                type="button"
		                id="mypageMenuButton"
		                data-bs-toggle="dropdown"
		                aria-expanded="false"
		                aria-label="メニューを開く">
		          <span class="hamburger-line"></span>
		          <span class="hamburger-line"></span>
		          <span class="hamburger-line"></span>
		        </button>
		
		        <ul class="dropdown-menu dropdown-menu-end mypage-dropdown"
		            aria-labelledby="mypageMenuButton">
		          <li><a class="dropdown-item" th:href="@{/mypage}">ユーザー情報確認</a></li>
		          <li><a class="dropdown-item" th:href="@{/edit}">ユーザー情報編集</a></li>
		          <li><a class="dropdown-item" th:href="@{/purchase_history}">購入履歴</a></li>
		          <li>
		            <form th:action="@{/logout}" method="post">
		              <button type="submit" class="dropdown-item">ログアウト</button>
		            </form>
		          </li>
		        </ul>
		      </div>
		    </li>
		  </ul>
		</nav>

        <!-- 未ログイン -->
        <nav sec:authorize="isAnonymous()" class="header-nav">
          <ul class="header-menu-list">
            <li><a th:href="@{/products}" class="menu-link">食材一覧</a></li>
            <li><a th:href="@{/signup}" class="menu-link">ユーザー登録</a></li>
            <li><a th:href="@{/login}" class="menu-link">ログイン</a></li>
          </ul>
        </nav>

      </div>
    </div>

    <!-- 下段：検索欄（管理者以外） -->
    <div class="header-bottom" sec:authorize="!hasRole('ADMIN')">
      <form class="header-search"
            th:action="@{/search}" method="get">
        <input type="search"
               name="keyword"
               class="form-control search-input"
               placeholder="フリーワード検索">
        <button type="submit" class="common-btn btn-primary search-submit-btn">検索</button>
      </form>
    </div>

  </div>

</header>
</body>
</html>
