<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>header</title>
</head>

<header th:fragment="header">

  <div class="header-wrap">

    <nav class="navbar navbar-expand-lg header-nav">
      <div class="container">

        <a class="navbar-brand site-logo" th:href="@{/top}">とれたてBOX</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-controls="mainNavbar"
                aria-expanded="false"
                aria-label="ナビゲーション切替">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">

          <ul class="navbar-nav ms-auto" sec:authorize="hasRole('ADMIN')">
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/admin/products}">食材管理</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/admin/product_new}">食材登録</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/admin/orders}">注文管理</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/admin/users}">顧客管理</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/logout}">ログアウト</a>
            </li>
          </ul>

          <ul class="navbar-nav ms-auto" sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/products}">食材一覧</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/cart}">カート</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/mypage}">マイページ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/logout}">ログアウト</a>
            </li>
          </ul>

          <ul class="navbar-nav ms-auto" sec:authorize="isAnonymous()">
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/products}">食材一覧</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/signup}">ユーザー登録</a>
            </li>
            <li class="nav-item">
              <a class="nav-link header-link" th:href="@{/login}">ログイン</a>
            </li>
          </ul>

        </div>
      </div>
    </nav>

    <div class="header-search-row" sec:authorize="!hasRole('ADMIN')">
      <div class="container">
        <form class="header-search-form d-flex"
              th:action="@{/search}"
              method="get">
          <input class="form-control search-input"
                 type="search"
                 name="keyword"
                 placeholder="フリーワード検索">
          <button class="btn btn-primary search-btn ms-2" type="submit">検索</button>
        </form>
      </div>
    </div>

  </div>

</header>
