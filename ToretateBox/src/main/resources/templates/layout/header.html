<!-- /templates/layout/header.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header" class="site-header">

    <!-- 左：ロゴ -->
    <div class="logo-box">
        <a th:href="@{/}" class="logo-text">とれたてBOX</a>
    </div>

    <!-- 右：メニュー + 検索 -->
    <div class="header-right">

        <nav class="header-menu">

            <!-- ログインユーザー -->
            <ul class="menu-list" sec:authorize="isAuthenticated()">
                <li><a th:href="@{/products}">食材一覧</a></li>
                <li><a th:href="@{/cart}">カート</a></li>

                <li class="hamburger-wrapper">
                    <button type="button" class="hamburger-btn" onclick="toggleMenu()">☰</button>
                    <ul id="hamburger-menu" class="hamburger-menu hidden">
                        <li><a th:href="@{/mypage}">ユーザー情報確認</a></li>
                        <li><a th:href="@{/user/edit}">ユーザー情報編集</a></li>
                        <li><a th:href="@{/orders}">購入履歴</a></li>
                        <li><a th:href="@{/logout}">ログアウト</a></li>
                    </ul>
                </li>
            </ul>

        </nav>

        <form class="header-search" th:action="@{/search}" method="get">
            <input type="text" name="keyword" placeholder="キーワードを入力">
            <button type="submit">検索</button>
        </form>

    </div>

    <!-- ★ ここが超重要 -->
    <script>
        function toggleMenu() {
            document.getElementById("hamburger-menu")
                    .classList.toggle("hidden");
        }
    </script>

</header>



</body>
</html>
