<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>とれたてBOX</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- ▼ ヘッダー（fragment） -->
<header th:fragment="header" class="site-header">

    <!-- 左：ロゴ -->
    <div class="logo-box">
        <a th:href="@{/}" class="logo-text">とれたてBOX</a>
    </div>

    <!-- 右側：メニュー + 検索 -->
    <div class="header-right">

        <!-- ▼ 上段：ヘッダーメニュー -->
        <nav class="header-menu">

            <!-- ▼ ゲスト用メニュー -->
            <ul sec:authorize="isAnonymous()">
                <li><a th:href="@{/list}">食材一覧</a></li>
                <li><a th:href="@{/cart}">カート</a></li>
                <li><a th:href="@{/signup}">ユーザー登録</a></li>
                <li><a th:href="@{/login}">ログイン</a></li>
            </ul>

            <!-- ▼ ログインユーザー用メニュー -->
            <ul sec:authorize="isAuthenticated()" class="login-menu">

                <!-- 食材一覧 -->
                <li><a th:href="@{/products}">食材一覧</a></li>

                <!-- カート -->
                <li><a th:href="@{/cart}">カート</a></li>

                <!-- ▼ マイページ ハンバーガーメニュー -->
                <li class="hamburger-wrapper">

                    <!-- ハンバーガーアイコン -->
                    <button class="hamburger-btn" onclick="toggleMenu()">☰</button>

                    <!-- ▼ 展開メニュー -->
                    <ul id="hamburger-menu" class="hamburger-menu hidden">

                        <li><a th:href="@{/mypage}">ユーザー情報確認</a></li>
                        <li><a th:href="@{/user/edit}">ユーザー情報編集</a></li>
                        <li><a th:href="@{/orders}">購入履歴</a></li>
                        <li><a th:href="@{/logout}">ログアウト</a></li>

                    </ul>
                </li>

            </ul>

        </nav>

        <!-- ▼ 下段：検索フォーム -->
        <form class="header-search" th:action="@{/search}" method="get">
            <input type="text" name="keyword" placeholder="キーワードを入力">
            <button type="submit">検索</button>
        </form>

    </div>

</header>

<!-- ▼ フッター -->
<footer th:fragment="footer" class="site-footer">
    <p>© 2025 とれたてBOX</p>
</footer>


<!-- ▼ ハンバーガーメニュー制御JS -->
<script>
    function toggleMenu() {
        document.getElementById("hamburger-menu").classList.toggle("hidden");
    }
</script>

</body>
</html>
