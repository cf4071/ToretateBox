<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ゲスト情報登録 | とれたてBOX</title>

    <!-- 共通 -->
    <link rel="stylesheet" th:href="@{/css/base.css}">

    <link rel="stylesheet" th:href="@{/css/guest.css}">
</head>

<body>

<main class="guest-wrapper">

    <h2 class="guest-title">ゲスト情報登録</h2>

    <!-- エラーメッセージ -->
    <div th:if="${errorMessage}" class="error-message">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/guest}" method="post" th:object="${guestForm}">

        <div class="form-group">
            <label>宛名</label>
            <input type="text" th:field="*{name}">
        </div>

        <div class="form-group">
            <label>電話番号</label>
            <input type="text" th:field="*{phoneNumber}">
        </div>

        <div class="form-group">
            <label>郵便番号</label>
            <input type="text" th:field="*{postalCode}">
        </div>

        <div class="form-group">
            <label>都道府県</label>
            <input type="text" th:field="*{prefecture}">
        </div>

        <div class="form-group">
            <label>市区町村</label>
            <input type="text" th:field="*{city}">
        </div>

        <div class="form-group">
            <label>町名・番地</label>
            <input type="text" th:field="*{addressLine1}">
        </div>

        <div class="form-group">
            <label>建物名・部屋番号（任意）</label>
            <input type="text" th:field="*{addressLine2}">
        </div>

        <div class="button-group">
            <button type="submit" class="register-btn">レジへ進む</button>
            <a th:href="@{/cart}" class="back-button">戻る</a>
        </div>

    </form>

</main>

</body>
</html>
