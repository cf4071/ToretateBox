<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ユーザー情報編集 | とれたてBOX</title>

<link rel="stylesheet" th:href="@{/css/user/user_edit.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="edit-wrapper">

    <h2 class="edit-title">ユーザー情報編集</h2>

    <form th:action="@{/user/edit}" th:object="${userEditForm}" method="post" class="edit-form">

      <div class="row">
        <label>氏名</label>
        <input type="text" th:field="*{name}">
        <p class="err" th:errors="*{name}"></p>
      </div>

      <div class="row">
        <label>フリガナ</label>
        <input type="text" th:field="*{nameKana}">
        <p class="err" th:errors="*{nameKana}"></p>
      </div>

      <div class="row">
        <label>電話番号</label>
        <input type="text" th:field="*{phoneNumber}">
        <p class="err" th:errors="*{phoneNumber}"></p>
      </div>

      <div class="row">
        <label>メールアドレス</label>
        <input type="text" th:field="*{email}">
        <p class="err" th:errors="*{email}"></p>
      </div>

      <div class="row">
        <label>パスワード</label>
        <input type="password" th:field="*{password}">
        <p class="err" th:errors="*{password}"></p>
      </div>

      <div class="row">
        <label>パスワード（再確認）</label>
        <input type="password" th:field="*{passwordConfirm}">
        <p class="err" th:errors="*{passwordConfirm}"></p>
      </div>

      <hr class="sep">

      <h3 class="mypage-subtitle">住所情報</h3>

      <div class="row">
        <label>郵便番号</label>
        <input type="text" th:field="*{postalCode}">
        <p class="err" th:errors="*{postalCode}"></p>
      </div>

      <div class="row">
        <label>都道府県</label>
        <input type="text" th:field="*{prefecture}">
        <p class="err" th:errors="*{prefecture}"></p>
      </div>

      <div class="row">
        <label>市区町村</label>
        <input type="text" th:field="*{city}">
        <p class="err" th:errors="*{city}"></p>
      </div>

      <div class="row">
        <label>町名・番地</label>
        <input type="text" th:field="*{addressLine1}">
        <p class="err" th:errors="*{addressLine1}"></p>
      </div>

      <div class="row">
        <label>建物名・部屋番号（任意）</label>
        <input type="text" th:field="*{addressLine2}">
        <p class="err" th:errors="*{addressLine2}"></p>
      </div>

      <div class="btns">
        <button type="submit" class="btn update">更新</button>
        <a th:href="@{/top}" class="btn back">戻る</a>
      </div>

    </form>

  </main>

</div>

</body>
</html>
