<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー情報編集 | とれたてBOX</title>
    <link rel="stylesheet" th:href="@{/css/user/user_edit.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

    <main th:fragment="content">
        <section class="page-section edit-page">
            <div class="page-container">

                <div class="edit-box">

                    <h2 class="page-title">ユーザー情報編集</h2>

                    <form th:action="@{/edit}" th:object="${userEditForm}" method="post" class="edit-form">

                        <div class="form-group">
                            <label class="form-label" for="name">氏名</label>
                            <input type="text" id="name" th:field="*{name}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="nameKana">フリガナ</label>
                            <input type="text" id="nameKana" th:field="*{nameKana}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('nameKana')}" th:errors="*{nameKana}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="phoneNumber">電話番号</label>
                            <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">メールアドレス</label>
                            <input type="text" id="email" th:field="*{email}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">パスワード</label>
                            <input type="password" id="password" th:field="*{password}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="passwordConfirm">パスワード（再確認）</label>
                            <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="postalCode">郵便番号</label>
                            <input type="text" id="postalCode" th:field="*{postalCode}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="prefecture">都道府県</label>
                            <input type="text" id="prefecture" th:field="*{prefecture}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('prefecture')}" th:errors="*{prefecture}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="city">市区町村</label>
                            <input type="text" id="city" th:field="*{city}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="addressLine1">町名・番地</label>
                            <input type="text" id="addressLine1" th:field="*{addressLine1}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('addressLine1')}" th:errors="*{addressLine1}"></p>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="addressLine2">建物名・部屋番号（任意）</label>
                            <input type="text" id="addressLine2" th:field="*{addressLine2}" class="form-input">
                            <p class="form-error" th:if="${#fields.hasErrors('addressLine2')}" th:errors="*{addressLine2}"></p>
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="common-btn btn-red">更新</button>
                            <a th:href="@{/top}" class="common-btn btn-blue">戻る</a>
                        </div>

                    </form>

                </div>

            </div>
        </section>
    </main>

</div>

</body>
</html>
