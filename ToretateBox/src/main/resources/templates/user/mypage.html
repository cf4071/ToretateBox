<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ユーザー情報 | とれたてBOX</title>
  <link rel="stylesheet" th:href="@{/css/user/mypage.css}">
</head>
<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content">
    <section class="page-section mypage-page">
      <div class="page-container">

        <div class="mypage-box">
          <h2 class="page-title">ユーザー情報</h2>

          <div class="user-info-table">

            <div class="info-row">
              <div class="info-label">氏名</div>
              <div class="info-value" th:text="${user.name}">田中 太郎</div>
            </div>

            <div class="info-row">
              <div class="info-label">フリガナ</div>
              <div class="info-value" th:text="${user.nameKana}">タナカ タロウ</div>
            </div>

            <div class="info-row">
              <div class="info-label">メールアドレス</div>
              <div class="info-value" th:text="${user.email}">sample@example.com</div>
            </div>

            <div class="info-row">
              <div class="info-label">電話番号</div>
              <div class="info-value" th:text="${user.phoneNumber}">09012345678</div>
            </div>

            <div class="info-row">
              <div class="info-label">パスワード</div>
              <div class="info-value" th:text="${maskedPassword}">********</div>
            </div>

            <div class="info-row">
              <div class="info-label">郵便番号</div>
              <div class="info-value" th:text="${address != null ? address.postalCode : ''}">123-4567</div>
            </div>

            <div class="info-row">
              <div class="info-label">都道府県</div>
              <div class="info-value" th:text="${address != null ? address.prefecture : ''}">東京都</div>
            </div>

            <div class="info-row">
              <div class="info-label">市区町村</div>
              <div class="info-value" th:text="${address != null ? address.city : ''}">新宿区</div>
            </div>

            <div class="info-row">
              <div class="info-label">町名・番地</div>
              <div class="info-value" th:text="${address != null ? address.addressLine1 : ''}">西新宿1-1-1</div>
            </div>

            <div class="info-row">
              <div class="info-label">建物名・部屋番号</div>
              <div class="info-value" th:text="${address != null ? address.addressLine2 : ''}">○○マンション101</div>
            </div>

          </div>

          <div class="btn-group">
            <a class="common-btn btn-danger" th:href="@{/edit}">編集</a>
            <a class="common-btn btn-primary" th:href="@{/top}">戻る</a>
          </div>

        </div>

      </div>
    </section>
  </main>

</div>

</body>
</html>
