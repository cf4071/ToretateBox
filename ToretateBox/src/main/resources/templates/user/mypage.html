<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ユーザー情報 | とれたてBOX</title>

  <link rel="stylesheet" th:href="@{/css/user/mypage.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content" class="mypage-wrapper">

    <h2 class="mypage-title">ユーザー情報</h2>

    <div class="mypage-form">

      <!-- ユーザー情報 -->
      <div class="form-row">
        <label>氏名</label>
        <input type="text" th:value="${user.name}" readonly>
      </div>

      <div class="form-row">
        <label>フリガナ</label>
        <input type="text" th:value="${user.nameKana}" readonly>
      </div>

      <div class="form-row">
        <label>メールアドレス</label>
        <input type="text" th:value="${user.email}" readonly>
      </div>

      <div class="form-row">
        <label>電話番号</label>
        <input type="text" th:value="${user.phoneNumber}" readonly>
      </div>

      <div class="form-row">
        <label>パスワード</label>
        <input type="text" th:value="${maskedPassword}" readonly>
      </div>

      <hr class="mypage-separator">

      <!-- 住所情報 -->
      <h3 class="mypage-subtitle">住所情報</h3>

      <div class="form-row">
        <label>郵便番号</label>
        <input type="text" th:value="${address != null ? address.postalCode : ''}" readonly>
      </div>

      <div class="form-row">
        <label>都道府県</label>
        <input type="text" th:value="${address != null ? address.prefecture : ''}" readonly>
      </div>

      <div class="form-row">
        <label>市区町村</label>
        <input type="text" th:value="${address != null ? address.city : ''}" readonly>
      </div>

      <div class="form-row">
        <label>町名・番地</label>
        <input type="text" th:value="${address != null ? address.addressLine1 : ''}" readonly>
      </div>

      <div class="form-row">
        <label>建物名・部屋番号</label>
        <input type="text" th:value="${address != null ? address.addressLine2 : ''}" readonly>
      </div>

      <div class="mypage-buttons">
        <a class="btn btn-edit" th:href="@{/edit}">編集</a>
        <a class="btn btn-back" th:href="@{/top}">戻る</a>
      </div>

    </div>

  </main>

</div>

</body>
</html>
