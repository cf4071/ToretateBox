<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>検索結果 | とれたてBOX</title>

  <!-- listと同じCSS -->
  <link rel="stylesheet" th:href="@{/css/common/product-card.css}">
  <link rel="stylesheet" th:href="@{/css/product/list.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

<main th:fragment="content" class="py-4">

  <div class="container">

    <!-- タイトル -->
    <div class="text-center mb-5">
      <h2 class="list-title" th:text="'検索結果：' + ${keyword}">検索結果</h2>
    </div>

    <!-- 商品なし -->
    <div th:if="${products == null or #lists.isEmpty(products)}"
         class="text-center empty-message">
      <p>該当する商品がありません。</p>
    </div>

    <!-- 商品一覧 -->
    <div th:if="${products != null and !#lists.isEmpty(products)}"
         class="row gx-4 gy-5 justify-content-center">

      <div th:each="p : ${products}" class="col-lg-3 col-md-4 col-sm-6 col-6">

        <div class="product-card h-100 text-center d-flex flex-column">

          <!-- 画像 -->
          <div class="image-box">
            <a th:href="@{'/products/' + ${p.id}}" class="image-link">
              <img th:if="${p.imageUrl != null and p.imageUrl != ''}"
                   th:src="@{${p.imageUrl}}"
                   th:alt="${p.name}"
                   class="img-fluid product-image">
            </a>
          </div>

          <!-- 商品情報 -->
          <div class="product-info mt-2">
            <div class="name" th:text="${p.name}">商品名</div>
            <div class="price" th:text="${p.price + '円'}">0円</div>
          </div>

        </div>

      </div>

    </div>

  </div>

</main>

</div>

</body>
</html>
