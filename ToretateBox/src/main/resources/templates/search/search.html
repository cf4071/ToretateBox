<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>検索結果 | とれたてBOX</title>

  <link rel="stylesheet" th:href="@{/css/common/common.css}">
  <link rel="stylesheet" th:href="@{/css/common/product-card.css}">
  <link rel="stylesheet" th:href="@{/css/search/search.css}">
</head>

<body>

<div th:replace="~{layout/layout :: layout(~{::title}, ~{::content})}">

  <main th:fragment="content">
    <section class="page-section search-page">
      <div class="page-container search-container">

        <h2 class="page-title search-title"
            th:text="${keyword != null} ? '検索結果：' + ${keyword} : '検索結果'">
          検索結果
        </h2>

        <div th:if="${products == null or #lists.isEmpty(products)}" class="no-message">
          <p>該当する商品がありません。</p>
        </div>

        <div th:if="${products != null and !#lists.isEmpty(products)}"
             class="row gx-4 gy-5 justify-content-center search-result-row">

          <div th:each="p : ${products}" class="col-lg-3 col-md-4 col-sm-6 col-6">
            <div class="product-card h-100 text-center d-flex flex-column">

              <div class="image-box">
                <a th:href="@{'/products/' + ${p.id}}" class="image-link">
                  <img th:src="${p.imageUrl != null and p.imageUrl != ''} 
				              ? ${p.imageUrl} 
				              : @{/images/no-image.png}"
				     th:alt="${p.name}"
				     class="img-fluid product-image">
                </a>
              </div>

              <div class="product-info mt-2">
                <div class="product-name" th:text="${p.name}">商品名</div>
                <div class="product-price">
				  <span th:text="${#numbers.formatInteger(p.price, 1, 'COMMA')}">0</span> 円
				</div>
              </div>

            </div>
          </div>
        </div>

        <nav class="search-pagination"
             th:if="${products != null and !#lists.isEmpty(products)}">

          <ul class="pagination">

            <li class="page-item"
                th:classappend="${currentPage == 0} ? ' disabled'">
              <a class="page-link"
                 th:if="${currentPage > 0}"
                 th:href="@{/search(page=${currentPage - 1}, keyword=${keyword})}">
                前へ
              </a>
              <span class="page-link" th:if="${currentPage == 0}">前へ</span>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? ' active'">
              <a class="page-link"
                 th:href="@{/search(page=${i}, keyword=${keyword})}"
                 th:text="${i + 1}">
                1
              </a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage >= totalPages - 1} ? ' disabled'">
              <a class="page-link"
                 th:if="${currentPage < totalPages - 1}"
                 th:href="@{/search(page=${currentPage + 1}, keyword=${keyword})}">
                次へ
              </a>
              <span class="page-link"
                    th:if="${currentPage >= totalPages - 1}">
                次へ
              </span>
            </li>

          </ul>
        </nav>

      </div>
    </section>
  </main>

</div>

</body>
</html>
