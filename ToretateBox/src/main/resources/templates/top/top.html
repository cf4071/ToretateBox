<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>旬の季節 - TOPページ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:insert="layout/layout :: header"></div>

<main>
    <div class="grid">

        <div class="top-title">
            <h2>旬の季節</h2>
        </div>

        <!-- 商品カード -->
        <div th:if="${products != null}" th:each="p : ${products}" class="card">

            <div class="image-box">
                <a th:href="@{'/product/' + ${p.id}}">
                    <img th:src="${p.imageUrl != null} ? ${p.imageUrl} : '@{/images/no-image.png}'" alt="商品画像">
                </a>
            </div>

            <div class="name" th:text="${p.name}">商品名</div>
            <div class="price" th:text="${p.price + '円'}">0円</div>

        </div>
        
        <div th:if="${products == null}">
            <p>商品がありません</p>
        </div>

    </div>
</main>

<div th:insert="layout/layout :: footer"></div>

</body>
</html>
